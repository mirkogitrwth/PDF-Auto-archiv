name: PDF KI Archivierung
on:
  workflow_dispatch: # Das ist dein Button in der App!
  schedule:
    - cron: '0 22 * * *' # Automatischer Lauf jeden Abend um 22 Uhr

jobs:
  run-archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Libraries
        run: |
          pip install google-generativeai pypdf google-api-python-client google-auth

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python Script.py
