name: PDF Archivierung
on:
  workflow_dispatch: # Das aktiviert den Knopf in der App
  schedule:
    - cron: '0 22 * * *' # Jeden Abend um 22:00 Uhr automatisch
jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      - name: Install Libs
        run: pip install google-generativeai pypdf google-api-python-client google-auth
      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python script.py
